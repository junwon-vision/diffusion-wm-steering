<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ctrl-World Results</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f6fa; color: #222; }
    header { background: #0048a6; color: #fff; padding: 1.2rem 2rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    nav { display: flex; gap: 0.5rem; padding: 1rem 2rem; background: #fff; border-bottom: 1px solid #ddd; flex-wrap: wrap; }
    nav button {
      padding: 0.4rem 1.2rem; border: 1px solid #0048a6; border-radius: 4px;
      background: #fff; color: #0048a6; cursor: pointer; font-size: 0.9rem;
    }
    nav button.active { background: #0048a6; color: #fff; }
    main { padding: 1.5rem 2rem; }
    section { display: none; }
    section.active { display: block; }
    h2 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #0048a6; }
    .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 1rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .row { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 1rem; }
    .card h3 { font-size: 0.95rem; margin-bottom: 0.75rem; color: #444; }
    .chart-wrap { position: relative; height: 320px; }
    .chart-wrap-wide { position: relative; height: 340px; }
    select { padding: 0.3rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    .controls { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .legend { display: flex; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
  </style>
</head>
<body>
<header>
  <h1>Ctrl-World Evaluation Results</h1>
</header>
<nav>
  <button class="active" onclick="showTab('failure', this)">Failure Detection</button>
  <button onclick="showTab('optim', this)">Reward Function</button>
</nav>
<main>

<!-- ── Failure Detection ─────────────────────────────────────── -->
<section id="failure" class="active">
  <h2>Failure Detection Rate by Ground-Truth Label</h2>
  <p class="subtitle">Bars show proportion of trials classified as failure; error bars are 95% Wilson CI.</p>
  <div class="legend" id="failure-legend"></div>
  <div class="row">
    <div class="card">
      <h3>G.T. Failure &nbsp;(higher = better detection)</h3>
      <div class="chart-wrap"><canvas id="chart-gt-failure"></canvas></div>
    </div>
    <div class="card">
      <h3>G.T. Success &nbsp;(lower = fewer false positives)</h3>
      <div class="chart-wrap"><canvas id="chart-gt-success"></canvas></div>
    </div>
  </div>
</section>

<!-- ── Reward Function ──────────────────────────────────────────────── -->
<section id="optim">
  <h2>Oolong Optimization: Base vs. Optim vs. Nominal</h2>
  <div class="controls">
    <label><strong>Reward function:</strong>&nbsp;<select id="reward-select"></select></label>
  </div>
  <div class="legend" id="optim-legend"></div>
  <div class="card">
    <div class="chart-wrap-wide"><canvas id="optim-chart"></canvas></div>
  </div>
</section>

</main>

function taskLabel(name) {
  const emoji = TASK_EMOJIS[name] || '';
  const display = TASK_DISPLAY[name] || name;
  return emoji ? `${emoji} ${display}` : display;
}

// ── Tab switching ─────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ── Error-bar plugin (asymmetric lo/hi) ──────────────────────
const errorBarPlugin = {
  id: 'errorBar',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    chart.data.datasets.forEach((ds, di) => {
      if (!ds.errLo && !ds.errSym) return;
      const meta = chart.getDatasetMeta(di);
      meta.data.forEach((bar, i) => {
        const val = ds.data[i];
        if (val == null || isNaN(val)) return;

        let lo, hi;
        if (ds.errLo) {
          lo = ds.errLo[i];
          hi = ds.errHi[i];
        } else {
          lo = hi = ds.errSym[i];
        }
        if ((lo == null || isNaN(lo)) && (hi == null || isNaN(hi))) return;
        lo = lo || 0; hi = hi || 0;

        const x = bar.x;
        const yTop = chart.scales.y.getPixelForValue(val + hi);
        const yBot = chart.scales.y.getPixelForValue(val - lo);
        const cap = 5;

        ctx.save();
        ctx.strokeStyle = ds.borderColor;
        ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.moveTo(x, yTop); ctx.lineTo(x, yBot); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x - cap, yTop); ctx.lineTo(x + cap, yTop); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x - cap, yBot); ctx.lineTo(x + cap, yBot); ctx.stroke();
        ctx.restore();
      });
    });
  },
};
Chart.register(errorBarPlugin);

// ── Chart helpers ─────────────────────────────────────────────
function makeBarOpts(yLabel, yMin, yMax) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { mode: 'index', intersect: false },
    },
    scales: {
      x: { ticks: { font: { size: 12 } } },
      y: {
        beginAtZero: yMin === undefined,
        ...(yMin !== undefined ? { min: yMin } : {}),
        ...(yMax !== undefined ? { max: yMax } : {}),
        title: { display: !!yLabel, text: yLabel, font: { size: 11 } },
      },
    },
  };
}

// ── Failure Detection ─────────────────────────────────────────
function renderFailure() {
  const { methods, colors, tasks } = FAILURE_DATA;
  const taskNames = Object.keys(tasks);

  // Build legend
  const legend = document.getElementById('failure-legend');
  methods.forEach(m => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background:${colors[m]}"></div><span>${m}</span>`;
    legend.appendChild(item);
  });

  const xLabels = taskNames.map(t => `${TASK_EMOJIS[t] || ''} ${TASK_DISPLAY[t] || t}`);

  ['gt_failure', 'gt_success'].forEach(gtKey => {
    const canvasId = gtKey === 'gt_failure' ? 'chart-gt-failure' : 'chart-gt-success';
    const canvas = document.getElementById(canvasId);

    const datasets = methods.map(m => {
      const vals  = taskNames.map(t => tasks[t][gtKey]?.[m]?.p  ?? null);
      const errLo = taskNames.map(t => tasks[t][gtKey]?.[m]?.lo ?? null);
      const errHi = taskNames.map(t => tasks[t][gtKey]?.[m]?.hi ?? null);
      return {
        label: m,
        data: vals,
        errLo,
        errHi,
        backgroundColor: colors[m] + 'cc',
        borderColor: colors[m],
        borderWidth: 1,
      };
    });

    new Chart(canvas, {
      type: 'bar',
      data: { labels: xLabels, datasets },
      options: {
        ...makeBarOpts('proportion classified as failure', 0, 1.12),
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const ds = ctx.dataset;
                const v = ds.data[ctx.dataIndex];
                const lo = ds.errLo?.[ctx.dataIndex];
                const hi = ds.errHi?.[ctx.dataIndex];
                if (v == null) return `${ds.label}: N/A`;
                let s = `${ds.label}: ${(v * 100).toFixed(1)}%`;
                if (lo != null) s += ` [−${(lo*100).toFixed(1)}%, +${(hi*100).toFixed(1)}%]`;
                return s;
              },
            },
          },
        },
      },
    });
  });
}

// ── Reward Function ───────────────────────────────────────────
let optimChart = null;

function renderOptim() {
  const { tasks, reward_keys, settings, qwen_flip_tasks, data } = OPTIM_DATA;

  // Reward selector
  const sel = document.getElementById('reward-select');
  reward_keys.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = REWARD_DISPLAY[k] || k;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => drawOptimChart(sel.value));

  // Legend
  const legend = document.getElementById('optim-legend');
  settings.forEach(({ label, color }) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div><span>${label}</span>`;
    legend.appendChild(item);
  });

  drawOptimChart(reward_keys[0]);
}

function drawOptimChart(rewardKey) {
  const { tasks, settings, qwen_flip_tasks, data } = OPTIM_DATA;
  const rewardData = data[rewardKey];
  const isQwen = rewardKey === 'qwen';

  const xLabels = tasks.map(t => {
    const base = `${taskLabel(t)}`;
    return isQwen && qwen_flip_tasks.includes(t) ? base + ' (−)' : base;
  });

  const datasets = settings.map(({ label, color }) => {
    const vals = tasks.map(t => rewardData?.[t]?.[label]?.mean ?? null);
    const errs = tasks.map(t => rewardData?.[t]?.[label]?.stderr ?? null);
    return {
      label,
      data: vals,
      errSym: errs,
      backgroundColor: color + 'cc',
      borderColor: color,
      borderWidth: 1,
    };
  });

  // Auto y-axis range
  const allVals = datasets.flatMap((ds, di) =>
    ds.data.map((v, i) => v != null ? [v - (ds.errSym[i]||0), v + (ds.errSym[i]||0)] : []).flat()
  ).filter(v => v != null);
  const yMin = Math.min(...allVals);
  const yMax = Math.max(...allVals);
  const pad = (yMax - yMin) * 0.15 || 0.1;

  if (optimChart) optimChart.destroy();
  const canvas = document.getElementById('optim-chart');
  optimChart = new Chart(canvas, {
    type: 'bar',
    data: { labels: xLabels, datasets },
    options: {
      ...makeBarOpts(REWARD_DISPLAY[rewardKey] || rewardKey, yMin - pad, yMax + pad),
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const ds = ctx.dataset;
              const v = ds.data[ctx.dataIndex];
              const e = ds.errSym?.[ctx.dataIndex];
              if (v == null) return `${ds.label}: N/A`;
              return `${ds.label}: ${v.toFixed(4)}${e != null ? ` ±${e.toFixed(4)}` : ''}`;
            },
          },
        },
      },
    },
  });
}

// ── Init ──────────────────────────────────────────────────────
renderFailure();
renderOptim();
</script>
